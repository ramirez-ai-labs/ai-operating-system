name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "mvp-*"
  workflow_dispatch:

permissions:
  contents: read

# Keep CI cost-conscious by cancelling older runs for the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: Repository Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required project docs exist
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f .gitignore

      - name: Verify Python cache files are ignored
        run: |
          grep -q '^__pycache__/' .gitignore
          grep -q '^\.pytest_cache/' .gitignore

  python-mvp:
    name: Python MVP Checks
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pyproject.toml') != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: pip install -e ".[dev]"

      - name: Compile Python sources
        run: |
          for path in apps director_os packages tests; do
            if [ -d "$path" ]; then
              python -m compileall "$path"
            fi
          done

      - name: Run test suite
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory present; skipping pytest."
          fi
