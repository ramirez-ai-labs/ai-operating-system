name: CI

on:
  pull_request:
    branches:
      - main
  push:
  workflow_dispatch:

permissions:
  contents: read

# Keep CI cost-conscious by cancelling older runs for the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-checks:
    name: Repository Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required project docs exist
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f .gitignore

      - name: Verify Python cache files are ignored
        run: |
          grep -q '^__pycache__/' .gitignore
          grep -q '^\.pytest_cache/' .gitignore

  python-mvp:
    name: Python MVP Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Compile Python sources
        run: |
          for path in apps director_os packages tests; do
            if [ -d "$path" ]; then
              python -m compileall "$path"
            fi
          done

      - name: Run test suite
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
